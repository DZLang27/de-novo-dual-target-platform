version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reinvent_platform
      POSTGRES_USER: reinvent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reinvent_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reinvent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://reinvent:${DB_PASSWORD:-reinvent_dev}@postgres:5432/reinvent_platform
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATA_DIR: /data
      REINVENT4_IMAGE: ${REINVENT4_IMAGE:-crpi-y5oaftfoxdmhqic8.cn-hangzhou.personal.cr.aliyuncs.com/zldeng27/reinvent4_tools:1.0.0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend/app:/app/app
      - data_volume:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://reinvent:${DB_PASSWORD:-reinvent_dev}@postgres:5432/reinvent_platform
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      REINVENT4_IMAGE: ${REINVENT4_IMAGE:-crpi-y5oaftfoxdmhqic8.cn-hangzhou.personal.cr.aliyuncs.com/zldeng27/reinvent4_tools:1.0.0}
    volumes:
      - ./backend/app:/app/app
      - data_volume:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --queues=gpu

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  data_volume:
